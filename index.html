<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foundry Chat</title>
<link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-header">
      <button id="new-chat-btn">＋ New chat</button>
    </div>
    <div id="conversations"></div>
    <div class="sidebar-footer">
      <button id="settings-btn">⚙️ Settings</button>
    </div>
  </aside>

  <button id="sidebar-toggle" title="Toggle sidebar">☰</button>

  <dialog id="settings-dialog">
    <form method="dialog" id="settings-form">
      <h2>Settings</h2>
      <label>
        Endpoint URL
        <input type="url" id="endpoint" required />
      </label>
      <label>
        Model / Deployment name
        <input type="text" id="model" required />
      </label>
      <label>
        API Key
        <input type="password" id="apikey" required />
        <small>Stored only in your browser's localStorage.</small>
      </label>
      <label>
        System prompt (optional)
        <textarea id="system" rows="3" placeholder="You are a helpful assistant."></textarea>
      </label>
      <div class="row">
        <button value="save" id="save-btn">Save</button>
        <button value="cancel" type="button" id="cancel-btn">Cancel</button>
      </div>
    </form>
  </dialog>

  <div id="main">
    <header>
      <h1 id="conversation-title">New chat</h1>
    </header>

    <main id="chat"></main>

    <form id="composer">
      <textarea id="input" placeholder="Type a message... (Enter to send, Shift+Enter for newline)" rows="2" required></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
